<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Regina Titan OS</title>

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1458/1458512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #c5a059; --teal: #004d40; 
            --glass: rgba(255, 255, 255, 0.93);
            --bg: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=2000');
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg) center/cover fixed;
            margin: 0; padding-bottom: 120px; color: #1a1a1a; overflow-x: hidden;
        }

        .header {
            padding: 70px 25px 30px; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            color: white; text-align: center;
        }

        /* DYNAMISME BIBLE EN HAUT */
        .bible-box { min-height: 60px; padding: 0 10px; }
        .bible-quote { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: var(--gold); font-style: italic; animation: fadeIn 2s; }

        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: white; z-index: 5000; transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); padding: 40px; }
        .sidebar.active { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 4999; backdrop-filter: blur(5px); }

        .glass { background: var(--glass); backdrop-filter: blur(25px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 10px 40px rgba(0,0,0,0.15); margin: 20px; }
        
        .card { padding: 25px; transition: 0.3s; }
        .tag { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; padding: 5px 12px; border-radius: 12px; margin-bottom: 12px; display: inline-block; }
        .tag-vision { background: #e0f2f1; color: var(--teal); }
        .tag-bible { background: #fff8e1; color: #8e6d31; }

        .title { font-weight: 800; font-size: 1.35rem; color: var(--teal); outline: none; margin-bottom: 5px; }
        .content { font-size: 1.05rem; line-height: 1.6; color: #333; outline: none; }

        /* CALENDRIER REACTIF */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; padding: 20px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 15px; font-weight: 800; transition: 0.2s; cursor: pointer; background: rgba(255,255,255,0.2); }
        .cal-day:active { background: var(--gold); transform: scale(0.9); color: white; }
        .today { background: var(--teal) !important; color: white; box-shadow: 0 5px 15px rgba(0,77,64,0.4); }

        .nav-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; height: 80px; display: flex; justify-content: space-around; align-items: center;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-radius: 35px; z-index: 4000;
        }
        .nav-btn { border: none; background: none; color: #bbb; font-weight: 800; font-size: 0.7rem; transition: 0.3s; }
        .nav-btn.active { color: var(--teal); transform: translateY(-5px); }
        .nav-icon { font-size: 1.7rem; display: block; margin-bottom: 4px; }

        .add-btn { position: fixed; bottom: 125px; right: 25px; width: 70px; height: 70px; border-radius: 25px; background: var(--teal); color: white; border: none; font-size: 35px; z-index: 3000; box-shadow: 0 10px 30px rgba(0,77,64,0.5); }
        
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<div id="sidebar" class="sidebar">
    <div style="font-size: 45px;">👑</div>
    <h2 style="color: var(--teal); font-weight: 800; margin: 10px 0;">Regina OS</h2>
    <p style="color: var(--gold); font-weight: 800; font-size: 0.75rem; letter-spacing: 2px;">ARCHITECTURE PAR GODFREE</p>
    <hr style="border: 0; height: 1px; background: #eee; margin: 30px 0;">
    <p style="font-size: 0.95rem; line-height: 1.7; color: #555;">Fusion entre <b>Foi Profonde</b> et <b>Vision Stratégique</b>.<br><br>Conçu exclusivement pour Mme Regina LOKONON.</p>
    <button onclick="toggleSidebar()" style="margin-top: 40px; width: 100%; padding: 20px; border-radius: 18px; border: none; background: var(--teal); color: white; font-weight: 800; font-size: 1rem;">Reprendre ma Vision</button>
</div>

<div class="header">
    <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 15px;">
        <div onclick="toggleSidebar()" style="font-size: 2rem; cursor: pointer;">☰</div>
        <div style="font-weight: 800; font-size: 1.3rem; letter-spacing: 1px;">REGINA OS</div>
        <div onclick="changeImage()" style="font-size: 2rem; cursor: pointer;">🖼️</div>
    </div>
    <div class="bible-box">
        <div id="dynamic-bible" class="bible-quote"></div>
    </div>
</div>

<div id="v-main" class="view">
    <div id="main-list"></div>
</div>

<div id="v-cal" class="view hidden" style="padding: 20px;">
    <div class="glass" style="padding-bottom: 20px;">
        <div style="display:flex; justify-content:space-between; align-items:center; padding: 25px;">
            <button onclick="mveM(-1)" style="border:none; background:none; font-size:2rem; color:var(--teal); font-weight: 800;">❮</button>
            <span id="calMonth" style="font-weight:800; color:var(--teal); font-size: 1.1rem;"></span>
            <button onclick="mveM(1)" style="border:none; background:none; font-size:2rem; color:var(--teal); font-weight: 800;">❯</button>
        </div>
        <div id="calGrid" class="cal-grid"></div>
    </div>
</div>

<button class="add-btn" onclick="askType()">+</button>

<nav class="nav-bar">
    <button class="nav-btn active" onclick="showV('v-main', this)"><span class="nav-icon">📜</span>FLUX</button>
    <button class="nav-btn" onclick="showV('v-cal', this)"><span class="nav-icon">📅</span>AGENDA</button>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('regina_v20')) || [];
    let m = new Date().getMonth(), y = new Date().getFullYear();
    const imgs = ['https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=2000','https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=2000','https://images.unsplash.com/photo-1444491741275-3747c53c99b4?q=80&w=2000'];
    let iIdx = 0;

    const verses = [
        "\"Confie tes projets à l'Éternel, et ils réussiront.\" - Proverbes 16:3",
        "\"Je puis tout par celui qui me fortifie.\" - Philippiens 4:13",
        "\"Car je connais les projets que j'ai formés sur vous, dit l'Éternel.\" - Jérémie 29:11",
        "\"Tout ce que ta main trouve à faire avec ta force, fais-le.\" - Ecclésiaste 9:10",
        "\"Ne t'ai-je pas donné cet ordre : Fortifie-toi et prends courage ?\" - Josué 1:9"
    ];

    function loadBible() {
        document.getElementById('dynamic-bible').innerText = verses[Math.floor(Math.random() * verses.length)];
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
    }

    function changeImage() {
        iIdx = (iIdx + 1) % imgs.length;
        document.body.style.backgroundImage = `url('${imgs[iIdx]}')`;
    }

    function showV(id, b) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        b.classList.add('active');
        if(id === 'v-cal') renderCal();
    }

    function askType(dateStr) {
        let typeChoice = confirm("OK pour VISION 🔭\nANNULER pour PAROLE SAINTE 📖");
        let type = typeChoice ? 'vision' : 'bible';
        let t = prompt(typeChoice ? "Titre de la Vision :" : "Référence Biblique :");
        if(!t) return;
        let c = prompt(typeChoice ? "Détails stratégiques :" : "Votre méditation :");
        db.unshift({id: Date.now(), type, t, c: c || "...", d: dateStr || new Date().toLocaleDateString('fr-FR')});
        save();
    }

    function save() {
        localStorage.setItem('regina_v20', JSON.stringify(db));
        render();
    }

    function render() {
        document.getElementById('main-list').innerHTML = db.map(i => `
            <div class="glass card">
                <div class="tag ${i.type === 'vision' ? 'tag-vision' : 'tag-bible'}">
                    ${i.type === 'vision' ? '🔭 Vision Foncière' : '📖 Parole Sainte'}
                </div>
                <div class="title" contenteditable="true" onblur="upd(${i.id},'t',this)">${i.t}</div>
                <div class="content" contenteditable="true" onblur="upd(${i.id},'c',this)">${i.c}</div>
                <div style="margin-top:20px; display:flex; justify-content:space-between; align-items:center; font-size:0.75rem; font-weight:800; opacity:0.6;">
                    <span>📍 ${i.d}</span>
                    <span onclick="del(${i.id})" style="color:#ff5e5e; cursor:pointer;">EFFACER</span>
                </div>
            </div>
        `).join('');
    }

    function upd(id, f, el) { let n = db.find(x => x.id === id); if(n) { n[f] = el.innerText; localStorage.setItem('regina_v20', JSON.stringify(db)); } }
    function del(id) { if(confirm("Supprimer définitivement ?")) { db = db.filter(x => x.id !== id); save(); } }

    function renderCal() {
        const grid = document.getElementById('calGrid');
        const d = new Date(y, m);
        document.getElementById('calMonth').innerText = d.toLocaleString('fr-FR', {month:'long', year:'numeric'}).toUpperCase();
        let h = ['LU','MA','ME','JE','VE','SA','DI'].map(x => `<div style="font-size:0.7rem; font-weight:800; color:var(--gold); text-align:center;">${x}</div>`).join('');
        let f = new Date(y, m, 1).getDay();
        let s = (f === 0) ? 6 : f - 1;
        for(let i=0; i<s; i++) h += '<div></div>';
        for(let i=1; i<=new Date(y, m+1, 0).getDate(); i++) {
            let today = (i === new Date().getDate() && m === new Date().getMonth() && y === new Date().getFullYear()) ? 'today' : '';
            h += `<div class="cal-day ${today}" onclick="askType('${i}/${m+1}/${y}')">${i}</div>`;
        }
        grid.innerHTML = h;
    }

    // FONCTION EXPERTE POUR LE CALENDRIER
    function mveM(dir) { 
        m += dir; 
        if(m < 0) { m = 11; y--; } 
        else if(m > 11) { m = 0; y++; } 
        renderCal(); 
    }

    loadBible();
    render();
</script>
</body>
</html>
