<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Regina Titan OS</title>

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1458/1458512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #c5a059; --teal: #004d40; 
            --glass: rgba(255, 255, 255, 0.92);
            --bg: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=2000');
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg) center/cover fixed;
            margin: 0; padding-bottom: 120px; color: #1a1a1a;
        }

        /* HEADER AVEC CITATION BÉNI */
        .header {
            padding: 70px 25px 30px; background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
            color: white; text-align: center;
        }
        .bible-quote { font-family: 'Playfair Display', serif; font-size: 0.9rem; color: var(--gold); margin-top: 10px; font-style: italic; }

        /* MENU BURGER (GODFREE SIGNATURE) */
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: white; z-index: 5000; transition: 0.4s; padding: 40px; box-shadow: 20px 0 50px rgba(0,0,0,0.2); }
        .sidebar.active { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 4999; backdrop-filter: blur(5px); }

        /* CARDS "SAVEUR" (Mélange Foi & Vision) */
        .glass { background: var(--glass); backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin: 20px; }
        
        .card { padding: 25px; position: relative; }
        .tag { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 4px 10px; border-radius: 10px; margin-bottom: 10px; display: inline-block; }
        .tag-vision { background: rgba(0, 77, 64, 0.1); color: var(--teal); }
        .tag-bible { background: rgba(197, 160, 89, 0.2); color: #8e6d31; }

        .title { font-weight: 800; font-size: 1.3rem; color: var(--teal); outline: none; }
        .content { font-size: 1.05rem; line-height: 1.6; color: #333; margin-top: 10px; outline: none; }

        /* CALENDRIER DYNAMIQUE */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 20px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .today { background: var(--teal); color: white; }

        /* NAVIGATION BASSE */
        .nav-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; height: 80px; display: flex; justify-content: space-around; align-items: center;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(15px); border-radius: 30px; z-index: 4000;
        }
        .nav-btn { border: none; background: none; color: #aaa; font-weight: 800; font-size: 0.7rem; }
        .nav-btn.active { color: var(--teal); }
        .nav-icon { font-size: 1.6rem; display: block; margin-bottom: 2px; }

        .add-btn { position: fixed; bottom: 125px; right: 25px; width: 70px; height: 70px; border-radius: 25px; background: var(--teal); color: white; border: none; font-size: 35px; z-index: 3000; box-shadow: 0 10px 25px rgba(0,77,64,0.4); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<div id="sidebar" class="sidebar">
    <div style="font-size: 40px;">👑</div>
    <h2 style="color: var(--teal); font-weight: 800; margin: 10px 0;">Regina OS</h2>
    <p style="color: var(--gold); font-weight: 800; font-size: 0.7rem; letter-spacing: 2px;">BY LOKONON GODFREE</p>
    <hr style="border: 0; height: 1px; background: #eee; margin: 30px 0;">
    <p style="font-size: 0.9rem; line-height: 1.6; color: #555;">Une plateforme unique où la <b>foi</b> guide la <b>vision</b> foncière. Conçue avec amour pour l'héritage de Regina.</p>
    <button onclick="toggleSidebar()" style="margin-top: 40px; width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--teal); color: white; font-weight: 800;">Retour à l'App</button>
</div>

<div class="header">
    <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
        <div onclick="toggleSidebar()" style="font-size: 1.8rem; cursor: pointer;">☰</div>
        <div style="font-weight: 800; font-size: 1.2rem; letter-spacing: 1px;">REGINA OS</div>
        <div onclick="changeImage()" style="font-size: 1.8rem; cursor: pointer;">🖼️</div>
    </div>
    <div class="bible-quote">"Confie tes projets à l'Éternel, et ils réussiront."</div>
</div>

<div id="v-main" class="view">
    <div id="main-list"></div>
</div>

<div id="v-cal" class="view hidden" style="padding: 20px;">
    <div class="glass">
        <div style="display:flex; justify-content:space-between; align-items:center; padding: 25px;">
            <button onclick="mveM(-1)" style="border:none; background:none; font-size:1.5rem; color:var(--teal);">❮</button>
            <span id="calMonth" style="font-weight:800; color:var(--teal);"></span>
            <button onclick="mveM(1)" style="border:none; background:none; font-size:1.5rem; color:var(--teal);">❯</button>
        </div>
        <div id="calGrid" class="cal-grid"></div>
    </div>
</div>

<button class="add-btn" onclick="askType()">+</button>

<nav class="nav-bar">
    <button class="nav-btn active" onclick="showV('v-main', this)"><span class="nav-icon">📜</span>FLUX</button>
    <button class="nav-btn" onclick="showV('v-cal', this)"><span class="nav-icon">📅</span>AGENDA</button>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('regina_v19')) || [];
    let m = new Date().getMonth(), y = new Date().getFullYear();
    const imgs = ['https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=2000','https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=2000','https://images.unsplash.com/photo-1444491741275-3747c53c99b4?q=80&w=2000'];
    let iIdx = 0;

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
    }

    function changeImage() {
        iIdx = (iIdx + 1) % imgs.length;
        document.body.style.backgroundImage = `url('${imgs[iIdx]}')`;
    }

    function showV(id, b) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        b.classList.add('active');
        if(id === 'v-cal') renderCal();
    }

    function askType() {
        let choice = confirm("Appuyez sur OK pour une VISION\nAppuyez sur ANNULER pour une PAROLE BIBLIQUE");
        let type = choice ? 'vision' : 'bible';
        let t = prompt(choice ? "Titre de la Vision :" : "Référence Biblique (ex: Josué 1:9) :");
        if(!t) return;
        let c = prompt(choice ? "Détails stratégiques :" : "Méditation ou Verset :");
        db.unshift({id: Date.now(), type, t, c: c || "...", d: new Date().toLocaleDateString('fr-FR')});
        save();
    }

    function save() {
        localStorage.setItem('regina_v19', JSON.stringify(db));
        render();
    }

    function render() {
        document.getElementById('main-list').innerHTML = db.map(i => `
            <div class="glass card">
                <div class="tag ${i.type === 'vision' ? 'tag-vision' : 'tag-bible'}">
                    ${i.type === 'vision' ? '🔭 Vision Foncière' : '📖 Parole Sainte'}
                </div>
                <div class="title" contenteditable="true" onblur="upd(${i.id},'t',this)">${i.t}</div>
                <div class="content" contenteditable="true" onblur="upd(${i.id},'c',this)">${i.c}</div>
                <div style="margin-top:20px; display:flex; justify-content:space-between; align-items:center; font-size:0.7rem; font-weight:800; opacity:0.6;">
                    <span>📍 ${i.d}</span>
                    <span onclick="del(${i.id})" style="color:red; cursor:pointer;">EFFACER</span>
                </div>
            </div>
        `).join('');
    }

    function upd(id, f, el) { let n = db.find(x => x.id === id); if(n) { n[f] = el.innerText; localStorage.setItem('regina_v19', JSON.stringify(db)); } }
    function del(id) { if(confirm("Supprimer définitivement ?")) { db = db.filter(x => x.id !== id); save(); } }

    function renderCal() {
        const grid = document.getElementById('calGrid');
        const d = new Date(y, m);
        document.getElementById('calMonth').innerText = d.toLocaleString('fr-FR', {month:'long', year:'numeric'}).toUpperCase();
        let h = ['LU','MA','ME','JE','VE','SA','DI'].map(x => `<div style="font-size:0.6rem; font-weight:800; color:var(--gold);">${x}</div>`).join('');
        let f = new Date(y, m, 1).getDay();
        let s = (f === 0) ? 6 : f - 1;
        for(let i=0; i<s; i++) h += '<div></div>';
        for(let i=1; i<=new Date(y, m+1, 0).getDate(); i++) {
            let today = (i === new Date().getDate() && m === new Date().getMonth()) ? 'today' : '';
            h += `<div class="cal-day ${today}" onclick="askType()">${i}</div>`;
        }
        grid.innerHTML = h;
    }

    function mveM(dir) { m += dir; if(m<0){m=11;y--;} if(m>11){m=0;y++;} renderCal(); }

    render();
</script>
</body>
</html>
