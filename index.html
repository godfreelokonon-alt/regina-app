<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regina Vision : The Final OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #c5a059; --dark: #0a1111; --teal: #004d40; 
            --glass: rgba(255, 255, 255, 0.82); --accent: #1a2a2a;
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=2000') center/cover fixed;
            margin: 0; color: var(--dark); padding-bottom: 100px;
        }

        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        /* HEADER LUXE */
        .header-pro {
            background: linear-gradient(135deg, rgba(0, 77, 64, 0.95), rgba(10, 17, 17, 0.95));
            color: white; padding: 60px 30px; border-bottom-left-radius: 50px; border-bottom-right-radius: 50px;
        }
        .avatar-crown { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 30px; border: 1px solid rgba(255,255,255,0.3); }

        /* NAVIGATION BASSE */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 90px;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            border-top-left-radius: 35px; border-top-right-radius: 35px; z-index: 2000;
        }
        .nav-btn { border: none; background: none; color: #aaa; font-size: 0.65rem; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--teal); }
        .nav-icon { font-size: 1.6rem; display: block; margin-bottom: 5px; }

        /* CONTENU */
        .tab-pane { display: none; padding: 25px; animation: fadeInUp 0.5s ease; }
        .active-tab { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* CALENDRIER EXPERT */
        .cal-box { padding: 20px; border-radius: 30px; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 800; color: var(--teal); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .cal-day.today { background: var(--teal); color: white; box-shadow: 0 5px 15px rgba(0,77,64,0.3); }

        /* CARTES VISION */
        .vision-card { border-radius: 25px; padding: 25px; margin-bottom: 20px; border-left: 8px solid var(--teal); }

        .add-float { position: fixed; bottom: 110px; right: 25px; width: 65px; height: 65px; border-radius: 22px; background: var(--teal); color: white; border: none; font-size: 30px; box-shadow: 0 10px 25px rgba(0,77,64,0.4); z-index: 1000; }
    </style>
</head>
<body>

<div class="header-pro">
    <div style="display: flex; align-items: center; gap: 20px;">
        <div class="avatar-crown">👑</div>
        <div>
            <p style="margin:0; color: var(--gold); font-size: 0.8rem; font-weight: 800; text-transform: uppercase;">Executive OS</p>
            <h2 style="margin:0; font-size: 1.6rem;">Mme Regina LOKONON</h2>
        </div>
    </div>
</div>

<div id="view-vision" class="tab-pane active-tab">
    <h3 style="font-weight: 800;">📝 Vision & Projets</h3>
    <div id="vision-list"></div>
</div>

<div id="view-calendar" class="tab-pane">
    <div class="cal-box glass">
        <div class="cal-header">
            <button onclick="moveMonth(-1)" style="border:none; background:none; font-size:1.5rem; cursor:pointer;">❮</button>
            <span id="monthTitle">Mars 2026</span>
            <button onclick="moveMonth(1)" style="border:none; background:none; font-size:1.5rem; cursor:pointer;">❯</button>
        </div>
        <div class="cal-grid" id="calendarGrid"></div>
    </div>
</div>

<div id="view-strat" class="tab-pane">
    <h3 style="font-weight: 800;">📊 Stratégie Foncière</h3>
    <div class="vision-card glass">
        <div style="font-weight: 800; color: var(--teal);">Acquisition Hectares</div>
        <div style="margin: 15px 0; background: #ddd; height: 8px; border-radius: 4px;">
            <div style="width: 40%; height: 100%; background: var(--gold); border-radius: 4px;"></div>
        </div>
        <span style="font-size: 0.7rem; font-weight: 800;">OBJECTIF : 10 HECTARES (40% ACCOMPLIS)</span>
    </div>
</div>

<button class="add-float" onclick="creerNote()">+</button>

<nav class="nav-bar">
    <button class="nav-item nav-btn active" onclick="showTab('view-vision', this)">
        <span class="nav-icon">📓</span> VISION
    </button>
    <button class="nav-item nav-btn" onclick="showTab('view-calendar', this)">
        <span class="nav-icon">📅</span> AGENDA
    </button>
    <button class="nav-item nav-btn" onclick="showTab('view-strat', this)">
        <span class="nav-icon">📊</span> STRATÉGIE
    </button>
</nav>

<script>
    let data = JSON.parse(localStorage.getItem('regina_final_v9')) || [];
    let m = new Date().getMonth(), y = new Date().getFullYear();

    function showTab(id, btn) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active-tab'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active-tab');
        btn.classList.add('active');
    }

    function moveMonth(d) { m += d; if(m<0){m=11;y--;} if(m>11){m=0;y++;} renderCal(); }

    function renderCal() {
        const grid = document.getElementById('calendarGrid');
        const title = document.getElementById('monthTitle');
        const date = new Date(y, m);
        title.innerText = date.toLocaleString('fr-FR', { month: 'long', year: 'numeric' });
        
        let html = ['L','M','M','J','V','S','D'].map(d => `<div style="font-size:0.7rem; font-weight:800; color:var(--gold)">${d}</div>`).join('');
        let firstDay = new Date(y, m, 1).getDay();
        let shift = firstDay === 0 ? 6 : firstDay - 1;
        for(let i=0; i<shift; i++) html += '<div></div>';
        for(let d=1; d<=new Date(y, m+1, 0).getDate(); d++) {
            let isToday = (d === new Date().getDate() && m === new Date().getMonth()) ? 'today' : '';
            html += `<div class="cal-day ${isToday}" onclick="creerNote('${d}/${m+1}/${y}')">${d}</div>`;
        }
        grid.innerHTML = html;
    }

    function creerNote(dateSpeciale) {
        let d = dateSpeciale || new Date().toLocaleDateString('fr-FR');
        let t = prompt("Note stratégique pour le " + d);
        if(t) {
            data.unshift({id: Date.now(), txt: t, date: d});
            localStorage.setItem('regina_final_v9', JSON.stringify(data));
            renderNotes();
        }
    }

    function renderNotes() {
        document.getElementById('vision-list').innerHTML = data.map(n => `
            <div class="vision-card glass">
                <div style="font-weight: 700; margin-bottom: 10px;">${n.txt}</div>
                <div style="font-size: 0.7rem; color: var(--gold); font-weight: 800;">📍 ${n.date}</div>
            </div>
        `).join('');
    }

    renderCal(); renderNotes();
</script>
</body>
</html>
