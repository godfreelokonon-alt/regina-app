<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Regina Titan OS | Sacred Edition</title>

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1458/1458512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #c5a059; --teal: #004d40; 
            --glass: rgba(255, 255, 255, 0.9);
            --bg-url: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=2000');
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-url) center/cover fixed;
            margin: 0; padding-bottom: 120px; transition: 0.8s ease; color: #1a1a1a;
        }

        /* SIDEBAR & MENU */
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: white; z-index: 5000; transition: 0.4s; padding: 50px 30px; box-shadow: 20px 0 50px rgba(0,0,0,0.2); }
        .sidebar.active { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 4999; backdrop-filter: blur(5px); }

        /* HEADER */
        .header { padding: 70px 25px 30px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%); color: white; }

        /* CARDS */
        .glass { background: var(--glass); backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 8px 32px rgba(0,0,0,0.1); margin: 20px; }
        .vision-card { padding: 25px; border-left: 6px solid var(--teal); position: relative; }
        .bible-card { padding: 25px; border-left: 6px solid var(--gold); background: rgba(255, 250, 240, 0.95); }
        
        .main-idea { outline: none; font-weight: 800; font-size: 1.3rem; color: var(--teal); margin-bottom: 8px; }
        .bible-ref { outline: none; font-weight: 800; font-size: 1.2rem; color: #8e6d31; font-style: italic; }
        .sub-note { outline: none; font-size: 1rem; color: #444; line-height: 1.5; }

        /* CALENDRIER */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 20px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .today { background: var(--teal); color: white; }

        /* NAVIGATION BASSE */
        .nav-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 92%; height: 75px; display: flex; justify-content: space-around; align-items: center;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(15px); border-radius: 25px; z-index: 4000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .nav-btn { border: none; background: none; color: #999; font-weight: 800; font-size: 0.6rem; text-align: center; }
        .nav-btn.active { color: var(--teal); }
        .nav-icon { font-size: 1.4rem; display: block; margin-bottom: 2px; }

        .add-btn { position: fixed; bottom: 120px; right: 30px; width: 65px; height: 65px; border-radius: 20px; background: var(--teal); color: white; border: none; font-size: 30px; z-index: 3000; box-shadow: 0 10px 20px rgba(0,77,64,0.3); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<div id="sidebar" class="sidebar">
    <h2 style="color: var(--teal); font-weight: 800;">Regina Titan OS</h2>
    <hr style="border: 0; height: 1px; background: #eee; margin: 20px 0;">
    <p style="color: var(--gold); font-weight: 800; font-size: 0.7rem;">AUTEUR</p>
    <p style="font-weight: 800; margin-top: 5px;">LOKONON Godfree</p>
    <p style="font-size: 0.8rem; color: #666;">Architecte Solution.</p>
    <button onclick="toggleSidebar()" style="margin-top: 40px; width: 100%; padding: 15px; border-radius: 12px; border: none; background: #f0f0f0; font-weight: 800;">Fermer</button>
</div>

<div class="header">
    <div onclick="toggleSidebar()" style="font-size: 1.5rem; cursor: pointer;">☰</div>
    <div style="font-weight: 800; letter-spacing: 1px;">REGINA OS</div>
    <div onclick="changeImage()" style="font-size: 1.5rem; cursor: pointer;">🖼️</div>
</div>

<div id="v-notes" class="view">
    <h3 style="margin-left: 25px; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.3);">📓 Vision & Projets</h3>
    <div id="vision-list"></div>
</div>

<div id="v-bible" class="view hidden">
    <h3 style="margin-left: 25px; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.3);">📜 Parole & Méditation</h3>
    <div id="bible-list"></div>
</div>

<div id="v-cal" class="view hidden" style="padding: 20px;">
    <div class="glass">
        <div style="display:flex; justify-content:space-between; align-items:center; padding: 20px;">
            <button onclick="mveM(-1)" style="border:none; background:none; font-size:1.5rem;">❮</button>
            <span id="calMonth" style="font-weight:800;"></span>
            <button onclick="mveM(1)" style="border:none; background:none; font-size:1.5rem;">❯</button>
        </div>
        <div id="calGrid" class="cal-grid"></div>
    </div>
</div>

<button class="add-btn" onclick="quickAdd()">+</button>

<nav class="nav-bar">
    <button class="nav-btn active" onclick="showV('v-notes', this)"><span class="nav-icon">📓</span>VISION</button>
    <button class="nav-btn" onclick="showV('v-bible', this)"><span class="nav-icon">📖</span>BIBLE</button>
    <button class="nav-btn" onclick="showV('v-cal', this)"><span class="nav-icon">📅</span>AGENDA</button>
</nav>

<script>
    let dbV = JSON.parse(localStorage.getItem('regina_vision')) || [];
    let dbB = JSON.parse(localStorage.getItem('regina_bible')) || [];
    let curView = 'v-notes';
    let m = new Date().getMonth(), y = new Date().getFullYear();
    const imgs = ['https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=2000','https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=2000','https://images.unsplash.com/photo-1444491741275-3747c53c99b4?q=80&w=2000'];
    let iIdx = 0;

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
    }

    function changeImage() {
        iIdx = (iIdx + 1) % imgs.length;
        document.body.style.backgroundImage = `url('${imgs[iIdx]}')`;
    }

    function showV(id, b) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        b.classList.add('active');
        curView = id;
        if(id === 'v-cal') renderCal();
    }

    function quickAdd(dStr) {
        let date = dStr || new Date().toLocaleDateString('fr-FR');
        if(curView === 'v-bible') {
            let ref = prompt("Référence biblique (ex: Psaumes 23:1) :");
            if(!ref) return;
            let note = prompt("Votre méditation :");
            dbB.unshift({id: Date.now(), ref, note: note || "...", date});
            localStorage.setItem('regina_bible', JSON.stringify(dbB));
            renderBible();
        } else {
            let t = prompt("Titre de la vision :");
            if(!t) return;
            let s = prompt("Détails :");
            dbV.unshift({id: Date.now(), t, s: s || "...", date});
            localStorage.setItem('regina_vision', JSON.stringify(dbV));
            renderVision();
        }
    }

    function renderVision() {
        document.getElementById('vision-list').innerHTML = dbV.map(v => `
            <div class="vision-card glass">
                <div class="main-idea" contenteditable="true" onblur="updV(${v.id},'t',this)">${v.t}</div>
                <div class="sub-note" contenteditable="true" onblur="updV(${v.id},'s',this)">${v.s}</div>
                <div style="margin-top:15px; font-size:0.7rem; font-weight:800; color:var(--gold); display:flex; justify-content:space-between;">
                    <span>📍 ${v.date}</span>
                    <span onclick="delV(${v.id})" style="color:red; cursor:pointer;">SUPPRIMER</span>
                </div>
            </div>
        `).join('');
    }

    function renderBible() {
        document.getElementById('bible-list').innerHTML = dbB.map(b => `
            <div class="bible-card glass">
                <div class="bible-ref" contenteditable="true" onblur="updB(${b.id},'ref',this)">${b.ref}</div>
                <div class="sub-note" contenteditable="true" onblur="updB(${b.id},'note',this)">${b.note}</div>
                <div style="margin-top:15px; font-size:0.7rem; font-weight:800; color:var(--gold); display:flex; justify-content:space-between;">
                    <span>🙏 ${b.date}</span>
                    <span onclick="delB(${b.id})" style="color:red; cursor:pointer;">SUPPRIMER</span>
                </div>
            </div>
        `).join('');
    }

    function updV(id, f, el) { let n = dbV.find(x => x.id === id); if(n) { n[f] = el.innerText; localStorage.setItem('regina_vision', JSON.stringify(dbV)); } }
    function updB(id, f, el) { let n = dbB.find(x => x.id === id); if(n) { n[f] = el.innerText; localStorage.setItem('regina_bible', JSON.stringify(dbB)); } }
    function delV(id) { if(confirm("Supprimer ?")) { dbV = dbV.filter(x => x.id !== id); localStorage.setItem('regina_vision', JSON.stringify(dbV)); renderVision(); } }
    function delB(id) { if(confirm("Supprimer ?")) { dbB = dbB.filter(x => x.id !== id); localStorage.setItem('regina_bible', JSON.stringify(dbB)); renderBible(); } }

    function renderCal() {
        const grid = document.getElementById('calGrid');
        const d = new Date(y, m);
        document.getElementById('calMonth').innerText = d.toLocaleString('fr-FR', {month:'long', year:'numeric'}).toUpperCase();
        let h = ['LU','MA','ME','JE','VE','SA','DI'].map(x => `<div style="font-size:0.6rem; font-weight:800; color:var(--gold);">${x}</div>`).join('');
        let f = new Date(y, m, 1).getDay();
        let s = (f === 0) ? 6 : f - 1;
        for(let i=0; i<s; i++) h += '<div></div>';
        for(let i=1; i<=new Date(y, m+1, 0).getDate(); i++) {
            let today = (i === new Date().getDate() && m === new Date().getMonth()) ? 'today' : '';
            h += `<div class="cal-day ${today}" onclick="quickAdd('${i}/${m+1}/${y}')">${i}</div>`;
        }
        grid.innerHTML = h;
    }

    function mveM(dir) { m += dir; if(m<0){m=11;y--;} if(m>11){m=0;y++;} renderCal(); }

    renderVision();
    renderBible();
</script>
</body>
</html>
