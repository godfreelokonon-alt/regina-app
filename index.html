<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regina Vision : High-End OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; --dark: #0f1717; --teal: #004d40; 
            --bg: #fdfdfd; --card: #ffffff; --accent: #1a2a2a;
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); margin: 0; color: var(--dark);
            padding-bottom: 100px;
        }

        /* HEADER LUXE */
        .header-premium {
            background: linear-gradient(135deg, var(--dark), var(--teal));
            color: white; padding: 50px 30px;
            border-bottom-left-radius: 50px; border-bottom-right-radius: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: left;
        }
        .profile-wrap { display: flex; align-items: center; gap: 20px; }
        .crown-avatar { 
            width: 70px; height: 70px; background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px); border-radius: 22px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; border: 1px solid rgba(255,255,255,0.2);
        }
        .user-info h2 { margin: 0; font-size: 1.6rem; font-weight: 800; }
        .user-info p { margin: 0; font-size: 0.9rem; color: var(--gold); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* BIBLE BOX GLASS */
        .bible-glass {
            background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            margin: -30px 25px 25px; padding: 25px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center; border: 1px solid rgba(212, 175, 55, 0.3);
        }

        /* TABS NAVIGATION */
        .tab-view { display: none; padding: 25px; animation: slideUp 0.5s ease; }
        .tab-view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* CALENDRIER INTERACTIF */
        .cal-container { background: white; padding: 20px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cal-nav button { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--teal); font-weight: 800; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .day-label { font-size: 0.7rem; font-weight: 800; color: #bbb; padding-bottom: 10px; }
        .day-cell { 
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center; 
            border-radius: 15px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
            transition: 0.3s; position: relative;
        }
        .day-cell:hover { background: #f0f7f6; color: var(--teal); }
        .day-cell.today { background: var(--teal); color: white; box-shadow: 0 5px 15px rgba(0,77,64,0.3); }
        .day-cell.has-note::after { content: ''; position: absolute; bottom: 5px; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; }

        /* NOTES CARDS */
        .vision-card {
            background: white; border-radius: 25px; padding: 25px;
            margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.02);
            border-left: 10px solid var(--teal); transition: 0.3s;
        }
        .vision-card:hover { transform: scale(1.02); }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: white; display: flex; justify-content: space-around; 
            align-items: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            border-top-left-radius: 35px; border-top-right-radius: 35px; z-index: 1000;
        }
        .nav-btn { border: none; background: none; color: #ccc; font-weight: 700; font-size: 0.7rem; transition: 0.3s; }
        .nav-btn.active { color: var(--teal); }
        .nav-btn span { display: block; font-size: 1.6rem; margin-bottom: 4px; }

        .add-float {
            position: fixed; bottom: 100px; right: 25px;
            width: 65px; height: 65px; border-radius: 22px;
            background: var(--teal); color: white; border: none;
            font-size: 30px; box-shadow: 0 10px 25px rgba(0,77,64,0.4);
            cursor: pointer; transition: 0.3s; z-index: 1000;
        }
    </style>
</head>
<body>

<div class="header-premium">
    <div class="profile-wrap">
        <div class="crown-avatar">👑</div>
        <div class="user-info">
            <p>Propriété exclusive</p>
            <h2>Mme Regina LOKONON</h2>
        </div>
    </div>
</div>

<div class="bible-glass">
    <div id="verseBox" style="font-style: italic; color: #555;">"Confie tes projets à l'Éternel et ils réussiront."</div>
    <div id="refBox" style="color: var(--gold); font-weight: 800; font-size: 0.7rem; margin-top: 8px; text-transform: uppercase;">Proverbes 16:3</div>
</div>

<div id="view-notes" class="tab-view active">
    <h3 style="font-weight: 800; margin-bottom: 20px;">📜 Vision & Agenda</h3>
    <div id="notes-list"></div>
</div>

<div id="view-calendar" class="tab-view">
    <div class="cal-container">
        <div class="cal-nav">
            <button onclick="changeMonth(-1)">❮</button>
            <h3 id="monthDisplay" style="margin:0; font-weight: 800;">Mars 2026</h3>
            <button onclick="changeMonth(1)">❯</button>
        </div>
        <div class="calendar-grid" id="calGrid"></div>
    </div>
    <p style="text-align: center; font-size: 0.8rem; color: #999; margin-top: 20px;">💡 Cliquez sur une date pour planifier</p>
</div>

<button class="add-float" onclick="ajouterNote()">+</button>

<nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('view-notes', this)">
        <span>📓</span> NOTES
    </button>
    <button class="nav-btn" onclick="switchTab('view-calendar', this)">
        <span>📅</span> AGENDA
    </button>
</nav>

<script>
    let visions = JSON.parse(localStorage.getItem('regina_v7')) || [];
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();

    const versets = [
        {t: "Tout est possible à celui qui croit.", r: "Marc 9:23"},
        {t: "Je puis tout par celui qui me fortifie.", r: "Phil 4:13"},
        {t: "L'Éternel est mon berger, je ne manquerai de rien.", r: "Psaume 23"}
    ];

    function switchTab(id, el) {
        document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function changeMonth(dir) {
        currentMonth += dir;
        if(currentMonth < 0) { currentMonth = 11; currentYear--; }
        if(currentMonth > 11) { currentMonth = 0; currentYear++; }
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calGrid');
        const monthTxt = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(new Date(currentYear, currentMonth));
        document.getElementById('monthDisplay').innerText = monthTxt;

        let html = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].map(d => `<div class="day-label">${d}</div>`).join('');
        
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        
        let startShift = firstDay === 0 ? 6 : firstDay - 1;

        for(let i=0; i<startShift; i++) html += '<div></div>';

        for(let d=1; d<=daysInMonth; d++) {
            const dateStr = `${d}/${currentMonth+1}/${currentYear}`;
            const isToday = d === new Date().getDate() && currentMonth === new Date().getMonth() ? 'today' : '';
            const hasNote = visions.some(v => v.date === dateStr) ? 'has-note' : '';
            html += `<div class="day-cell ${isToday} ${hasNote}" onclick="ajouterNote('${dateStr}')">${d}</div>`;
        }
        grid.innerHTML = html;
    }

    function ajouterNote(specificDate = null) {
        const dateAction = specificDate || new Date().toLocaleDateString('fr-FR');
        let txt = prompt(`Action pour le ${dateAction} :`);
        if (txt) {
            visions.unshift({ id: Date.now(), texte: txt, date: dateAction });
            localStorage.setItem('regina_v7', JSON.stringify(visions));
            renderNotes();
            renderCalendar();
            const v = versets[Math.floor(Math.random()*versets.length)];
            document.getElementById('verseBox').innerText = `"${v.t}"`;
            document.getElementById('refBox').innerText = v.r;
        }
    }

    function renderNotes() {
        const list = document.getElementById('notes-list');
        if (visions.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#ccc; margin-top:40px;">Votre vision est en attente, Regina...</p>';
            return;
        }
        list.innerHTML = visions.map(v => `
            <div class="vision-card">
                <div style="font-weight: 800; font-size: 1.1rem; margin-bottom: 10px;">${v.texte}</div>
                <div style="font-size: 0.7rem; color: var(--gold); font-weight: 800;">📍 PRÉVU POUR LE : ${v.date}</div>
            </div>
        `).join('');
    }

    renderCalendar();
    renderNotes();
</script>
</body>
</html>
